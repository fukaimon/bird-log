<!DOCTYPE html>
<html>

<head>
<meta charset="UTF-8">
<title>Bird Log</title>
<meta name="viewport" content="width=device-width,initial-scale=1">

<link rel="manifest" href="manifest.json">

<link rel="stylesheet" href="style.css">
</head>

<body>

<h2>鳥の記録</h2>

<label>鳥の名前</label><br>
<input id="species">

<button onclick="toggleSp()">sp.</button>

<h3>よく見る鳥</h3>
<div id="birdButtons"></div>

<h3>数</h3>

<div>
<button onclick="minus()">−</button>
<span id="count">1</span>
<button onclick="plus()">＋</button>
</div>

<br>

<div>
<label>直接入力</label><br>
<input id="countInput" type="number" value="1">
</div>

<br>

<div>

<label>おおよその数</label><br>

<button onclick="setApprox('+')">+</button>
<button onclick="setApprox('-')">-</button>
<button onclick="setApprox('±')">±</button>

<span id="approx"></span>

</div>

<br>

<button id="saveBtn" onclick="saveBird()">記録</button>

<h3>今日の記録</h3>
<ul id="list"></ul>

<h3>テキスト出力</h3>

<h3>種ごとの合計（今日）</h3>

<button onclick="showSummary()">表示</button>

<pre id="summaryArea"></pre>

<h3>時間ごとの合計（今日）</h3>

<pre id="timeSummaryArea"></pre>

<button onclick="exportText()">表示</button>

<pre id="exportArea"></pre>

<hr>

<h3>よく見る鳥を設定</h3>

<input id="newBird">
<button onclick="addBird()">追加</button>

<ul id="customBirdList"></ul>

<!-- 編集ポップアップ -->

<div id="editModal" class="modal">

<div class="modal-content">

<h3>記録を編集</h3>

<label>鳥の名前</label><br>
<input id="editSpecies">

<br><br>

<label>数</label><br>
<input id="editCount" type="number">

<br><br>

<label>概数</label><br>

<button onclick="setEditApprox('+')">+</button>
<button onclick="setEditApprox('-')">-</button>
<button onclick="setEditApprox('±')">±</button>

<span id="editApprox"></span>

<br><br>

<button onclick="updateRecord()">更新</button>
<button onclick="closeEditModal()">キャンセル</button>

</div>

</div>

<script src="app.js"></script>

</body>
</html>
